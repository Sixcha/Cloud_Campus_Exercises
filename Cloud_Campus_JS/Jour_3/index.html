<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>JS Exercices</title>
  </head>
  <body>
    <main>
        <a href="#" id="appear">Faire apparaitre la calculatrice</a>
        <a href="#" id="disappear">Faire disparaitre la calculatrice</a>
        <form action="" id="calculator">
            <input type="number" name="first-number" id="first-number">
            <select name="operator" id="operator">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>
            <input type="number" name="second-number" id="second-number">
            <input type="button" value="Calculer" id="submit">
        </form> <br>
        <p id="information"></p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
